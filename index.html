<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Tasker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    // You can extend theme here if needed
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 dark:bg-gray-950">
    <div class="flex h-screen overflow-hidden flex-col md:flex-row">
        <!-- Sidebar - hidden on mobile, visible on desktop -->
        <div class="hidden md:flex w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex-col">
            <div class="p-6 border-b border-gray-200 dark:border-gray-800">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">📋</div>
                    <span class="font-bold text-2xl text-gray-900 dark:text-white">Tasker</span>
                </div>
            </div>
            
            <div class="p-4 flex-1 overflow-y-auto">
                <nav class="space-y-1">
                    <a href="#" onclick="navigateTo('home')" class="sidebar-link nav-active flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-2xl" id="nav-home">
                        <i class="fa-solid fa-house w-5"></i><span>Home</span>
                    </a>
                    <a href="#" onclick="navigateTo('tasks')" class="sidebar-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300" id="nav-tasks">
                        <i class="fa-solid fa-list-check w-5"></i><span>My Tasks</span>
                    </a>
                    <a href="#" onclick="navigateTo('calendar')" class="sidebar-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300" id="nav-calendar">
                        <i class="fa-solid fa-calendar-days w-5"></i><span>Calendar</span>
                    </a>
                    <a href="#" onclick="navigateTo('reports')" class="sidebar-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300" id="nav-reports">
                        <i class="fa-solid fa-chart-simple w-5"></i><span>Reports</span>
                    </a>
                    
                    <hr class="my-4 border-gray-200 dark:border-gray-700">
                    
                    <a href="#" onclick="navigateTo('about')" class="sidebar-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300" id="nav-about">
                        <i class="fa-solid fa-info-circle w-5"></i><span>About</span>
                    </a>
                    <a href="#" onclick="navigateTo('contact')" class="sidebar-link flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300" id="nav-contact">
                        <i class="fa-solid fa-envelope w-5"></i><span>Contact</span>
                    </a>
                </nav>
            </div>
            
            <div class="p-4 border-t border-gray-200 dark:border-gray-800">
                <div onclick="navigateTo('profile')" class="flex items-center gap-3 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800 p-3 rounded-2xl">
                    <div id="sidebar-avatar" class="w-9 h-9 bg-gradient-to-br from-blue-500 to-purple-500 rounded-2xl flex items-center justify-center text-white font-semibold">J</div>
                    <div class="flex-1">
                        <div id="sidebar-name" class="font-medium text-sm text-gray-900 dark:text-white">Jessavie</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col min-h-0">
            <div class="h-16 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-4 md:px-8 flex items-center justify-between">
                <div class="flex items-center gap-4 flex-1">
                    <div class="relative w-full max-w-md">
                        <i class="fa-solid fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input id="search-input" type="text" placeholder="Search tasks..." 
                               onkeyup="if(event.key==='Enter') searchTasks()"
                               class="w-full bg-gray-100 dark:bg-gray-800 rounded-3xl py-3 px-5 pl-12 focus:outline-none text-gray-900 dark:text-white placeholder-gray-500">
                    </div>
                </div>
                
                <div class="flex items-center gap-3 md:gap-6 ml-4">
                    <button onclick="toggleTheme()" class="p-2 text-gray-600 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 transition-colors" title="Toggle Theme">
                        <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
                    </button>
                    <button onclick="toggleNotifications()" class="relative p-2 text-gray-600 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 transition-colors">
                        <i class="fa-solid fa-bell text-xl"></i>
                        <span id="notif-dot" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full hidden"></span>
                    </button>
                    <button onclick="showAddTaskModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 md:px-5 py-2.5 rounded-3xl flex items-center gap-2 transition-colors">
                        <i class="fa-solid fa-plus"></i> <span class="hidden md:inline">New Task</span>
                    </button>
                    <button onclick="logout()" class="text-gray-600 hover:text-red-600 dark:text-gray-400 dark:hover:text-red-400 transition-colors text-sm md:text-base">Logout</button>
                </div>
            </div>
            
            <div class="flex-1 overflow-auto p-4 md:p-8 pb-24 md:pb-8" id="main-content"></div>

            <!-- Bottom Navigation for Mobile -->
            <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 px-1 py-3 flex justify-between items-center z-40">
                <a href="#" onclick="navigateTo('home')" class="flex-1 flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400" id="mobile-nav-home">
                    <i class="fa-solid fa-house text-lg"></i>
                    <span class="text-[8px] font-medium">Home</span>
                </a>
                <a href="#" onclick="navigateTo('tasks')" class="flex-1 flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400" id="mobile-nav-tasks">
                    <i class="fa-solid fa-list-check text-lg"></i>
                    <span class="text-[8px] font-medium">Tasks</span>
                </a>
                <a href="#" onclick="navigateTo('calendar')" class="flex-1 flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400" id="mobile-nav-calendar">
                    <i class="fa-solid fa-calendar-days text-lg"></i>
                    <span class="text-[8px] font-medium">Calendar</span>
                </a>
                <a href="#" onclick="navigateTo('reports')" class="flex-1 flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400" id="mobile-nav-reports">
                    <i class="fa-solid fa-chart-simple text-lg"></i>
                    <span class="text-[8px] font-medium">Reports</span>
                </a>
                <a href="#" onclick="navigateTo('about')" class="flex-1 flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400" id="mobile-nav-about">
                    <i class="fa-solid fa-info-circle text-lg"></i>
                    <span class="text-[8px] font-medium">About</span>
                </a>
                <a href="#" onclick="navigateTo('contact')" class="flex-1 flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400" id="mobile-nav-contact">
                    <i class="fa-solid fa-envelope text-lg"></i>
                    <span class="text-[8px] font-medium">Contact</span>
                </a>
                <a href="#" onclick="navigateTo('profile')" class="flex-1 flex flex-col items-center gap-1 text-gray-500 dark:text-gray-400" id="mobile-nav-profile">
                    <i class="fa-solid fa-user text-lg"></i>
                    <span class="text-[8px] font-medium">Profile</span>
                </a>
            </div>
        </div>
    </div>

    <div id="task-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50"></div>
    <div id="auth-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-[100]"></div>

    <script src="script.js"></script>
</body>
</html>
